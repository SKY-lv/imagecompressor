<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImageCompressor - 图片压缩工具</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;}
.app{max-width:800px;margin:0 auto;padding:20px;}
.header{text-align:center;margin-bottom:20px;}
.header h1{font-size:1.5em;} .header h1 span{color:#f97316;}
.drop-zone{border:3px dashed #334155;border-radius:12px;padding:60px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:20px;}
.drop-zone:hover,.drop-zone.drag{background:#1e293b;border-color:#f97316;}
.drop-zone input{display:none;}
.drop-zone p{color:#64748b;font-size:14px;}
.results{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:16px;}
.image-item{display:flex;gap:16px;padding:16px;border-bottom:1px solid #334155;align-items:center;}
.image-item:last-child{border-bottom:none;}
.image-item img{width:80px;height:80px;object-fit:cover;border-radius:8px;}
.image-item .info{flex:1;}
.image-item .name{font-size:14px;margin-bottom:4px;}
.image-item .size{font-size:12px;color:#64748b;}
.image-item .new-size{color:#22c55e;font-size:12px;}
.slider-wrap{display:flex;align-items:center;gap:12px;margin-top:8px;}
.slider-wrap input{flex:1;accent-color:#f97316;}
</style>
</head>
<body>
<div class="app">
  <div class="header"><h1>Image<span>Compressor</span></h1></div>
  
  <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <p>拖拽图片或点击上传</p>
    <p style="font-size:12px;margin-top:8px">支持 JPG, PNG, WebP</p>
    <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(this.files)">
  </div>
  
  <div class="results" id="results"></div>
</div>

<script>
const dropZone = document.getElementById('drop-zone');
dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('drag'); };
dropZone.ondragleave = () => dropZone.classList.remove('drag');
dropZone.ondrop = e => { e.preventDefault(); dropZone.classList.remove('drag'); handleFiles(e.dataTransfer.files); };

function handleFiles(files) {
  Array.from(files).forEach(compressImage);
}

function compressImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      
      const quality = 0.7;
      const dataUrl = canvas.toDataURL('image/jpeg', quality);
      
      const resultDiv = document.getElementById('results');
      resultDiv.innerHTML = `
        <div class="image-item">
          <img src="${dataUrl}">
          <div class="info">
            <div class="name">${file.name}</div>
            <div class="size">原始: ${(file.size/1024).toFixed(1)} KB</div>
            <div class="new-size">压缩后: ${(dataUrl.length * 0.75/1024).toFixed(1)} KB</div>
          </div>
          <a href="${dataUrl}" download="${file.name.replace(/\.[^.]+$/, '_compressed.jpg')}">
            <button style="padding:10px 20px;background:#f97316;color:#000;border:none;border-radius:8px;cursor:pointer">下载</button>
          </a>
        </div>
      ` + resultDiv.innerHTML;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
</script>
</body>
</html>
